<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 100px auto;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h2>URL Shortener</h2>

<input id="urlInput" placeholder="Enter URL (https://...)" />
<button onclick="shorten()">Shorten</button>

<div class="result" id="result"></div>

<script>
    async function shorten() {
        const url = document.getElementById("urlInput").value;

        const response = await fetch("http://localhost:8080/api/urls", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ url })
        });

        const data = await response.json();

        document.getElementById("result").innerHTML =
            `Short URL: <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>`;
    }
</script>

</body>
</html>
