<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Контакты — EasyLink</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .contacts-centered {
            max-width: 500px;
            margin: 0 auto;
        }
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }
        .contact-item:last-child {
            border-bottom: none;
        }
        .contact-item i {
            font-size: 1.8rem;
            color: #0d6efd;
            width: 2.5rem;
            text-align: center;
        }
        .contact-item .info {
            font-size: 1.1rem;
        }
        .contact-item .info a {
            text-decoration: none;
            font-weight: 500;
        }
        .contact-item .info a:hover {
            text-decoration: underline;
        }
        .contact-item .info .label {
            display: block;
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<div class="container">
    <header class="d-flex flex-wrap align-items-center justify-content-between py-3 mb-4 border-bottom">
        <div class="d-flex align-items-center">
            <i class="bi bi-link-45deg" style="font-size: 32px;"></i>
            <span class="fw-bold fs-4 ms-2">EasyLink</span>
        </div>
        <ul class="nav">
            <li><a href="/" class="nav-link link-secondary">Главная</a></li>
            <li><a href="/all-urls" class="nav-link">Все ссылки</a></li>
            <li><a href="/about" class="nav-link">О сервисе</a></li>
            <li><a href="/contacts" class="nav-link active">Контакты</a></li>
        </ul>
        <div id="authHeader">
            <a href="/login" class="btn btn-outline-primary me-2">Войти</a>
            <a href="/register" class="btn btn-primary">Регистрация</a>
        </div>
    </header>
</div>

<main class="container flex-grow-1 mt-4">
    <h2 class="text-center mb-4">Контакты</h2>
    <p class="text-center text-muted mb-5">Свяжитесь с нами любым удобным способом</p>

    <div class="contacts-centered">
        <div class="contact-item">
            <i class="bi bi-envelope"></i>
            <div class="info">
                <span class="label">Email</span>
                <a href="mailto:maksborodi@gmail.com">maksborodi@gmail.com</a>
            </div>
        </div>
        <div class="contact-item">
            <i class="bi bi-telegram"></i>
            <div class="info">
                <span class="label">Telegram</span>
                <span class="fw-semibold">@maakssik</span>
            </div>
        </div>
    </div>


</main>

<footer class="container py-3 border-top mt-auto">
    <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <i class="bi bi-link-45deg" style="font-size: 28px;"></i>
            <span class="ms-2 text-body-secondary">© 2026 EasyLink</span>
        </div>
    </div>
</footer>

<script>
    async function loadCurrentUser() {
        try {
            const response = await fetch("/api/auth/me", { credentials: "include" });
            if (response.ok) {
                const user = await response.json();
                document.getElementById("authHeader").innerHTML =
                    `<span class="me-3 text-body-secondary">${user.username}</span>` +
                    `<button class="btn btn-outline-secondary" onclick="logout()">Выйти</button>`;
            }
        } catch (e) { /* guest */ }
    }

    async function logout() {
        try {
            await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
            window.location.href = "/";
        } catch (e) {
            alert("Ошибка сети. Проверьте подключение.");
        }
    }

    loadCurrentUser();
</script>

</body>
</html>
