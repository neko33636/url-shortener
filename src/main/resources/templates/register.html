<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Регистрация — EasyLink</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div class="container">
    <header class="d-flex flex-wrap align-items-center justify-content-between py-3 mb-4 border-bottom">
        <div class="d-flex align-items-center">
            <i class="bi bi-link-45deg" style="font-size: 32px;"></i>
            <span class="fw-bold fs-4 ms-2">EasyLink</span>
        </div>
        <ul class="nav">
            <li><a href="/" class="nav-link link-secondary">Главная</a></li>
            <li><a href="/login" class="nav-link">Вход</a></li>
        </ul>
    </header>
</div>

<main class="container flex-grow-1 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="mb-4">Регистрация</h2>
            <form id="registerForm" onsubmit="register(event)">
                <div class="mb-3">
                    <label for="username" class="form-label">Имя пользователя</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" id="password" class="form-control" required minlength="4">
                </div>
                <button type="submit" id="registerBtn" class="btn btn-primary w-100">Зарегистрироваться</button>
            </form>
            <div id="message" class="mt-3"></div>
            <p class="mt-3 text-body-secondary">
                Уже есть аккаунт? <a href="/login">Войти</a>
            </p>
        </div>
    </div>
</main>

<script>
    async function register(event) {
        event.preventDefault();
        const btn = document.getElementById("registerBtn");
        const message = document.getElementById("message");
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        btn.disabled = true;
        btn.textContent = "Обработка…";
        message.innerHTML = "";

        try {
            const response = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ username, password })
            });

            const data = await response.json().catch(() => ({}));

            if (response.ok) {
                message.innerHTML = `<div class="alert alert-success">Аккаунт создан. <a href="/login">Войти</a></div>`;
                return;
            }

            message.innerHTML = `<div class="alert alert-danger">${data.error || "Ошибка регистрации"}</div>`;
        } catch (e) {
            alert("Ошибка сети. Проверьте подключение.");
        } finally {
            btn.disabled = false;
            btn.textContent = "Зарегистрироваться";
        }
    }
</script>

</body>
</html>
