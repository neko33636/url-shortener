<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EasyLink</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="d-flex flex-column min-vh-100">

<div class="container">

    <!-- HEADER -->
    <header class="d-flex flex-wrap align-items-center justify-content-between py-3 mb-4 border-bottom">

        <div class="d-flex align-items-center">
            <i class="bi bi-link-45deg" style="font-size: 32px;"></i>
            <span class="fw-bold fs-4 ms-2">EasyLink</span>
        </div>

        <ul class="nav">
            <li><a href="/" class="nav-link link-secondary">Главная</a></li>
            <li><a href="/all-urls" class="nav-link">Все ссылки</a></li>
            <li><a href="/about" class="nav-link">О сервисе</a></li>
            <li><a href="/contacts" class="nav-link">Контакты</a></li>
        </ul>

        <div>
            <button class="btn btn-outline-primary me-2">Войти</button>
            <button class="btn btn-primary">Регистрация</button>
        </div>

    </header>

</div>

<!-- MAIN CONTENT (растягивается и толкает footer вниз) -->
<main class="container flex-grow-1 mt-5">

    <h2 class="mb-4">Сократить ссылку</h2>

    <div class="input-group mb-3">
        <input type="text"
               id="urlInput"
               class="form-control"
               placeholder="https://example.com">

        <button class="btn btn-primary"
                onclick="shortenUrl()">
            Сократить
        </button>
    </div>

    <div id="result"></div>

</main>

<!-- FOOTER -->
<footer class="container py-3 border-top mt-auto">

    <div class="d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center">
            <i class="bi bi-link-45deg" style="font-size: 28px;"></i>
            <span class="ms-2 text-body-secondary">© 2026 EasyLink</span>
        </div>

        <div>
            <i class="bi bi-telegram fs-3"></i>
        </div>

    </div>

</footer>

<!-- JS -->
<script>
    async function shortenUrl() {
        const url = document.getElementById("urlInput").value;

        if (!url) {
            document.getElementById("result").innerHTML =
                `<div class="alert alert-danger">Введите ссылку</div>`;
            return;
        }

        try {
            const response = await fetch("/api/urls", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ url })
            });

            const data = await response.json();

            document.getElementById("result").innerHTML =
                `<div class="alert alert-success mt-3">
                    Короткая ссылка: <br>
                    <a href="${data.shortUrl}" target="_blank">
                        ${data.shortUrl}
                    </a>
                </div>`;

        } catch (e) {
            document.getElementById("result").innerHTML =
                `<div class="alert alert-danger">Ошибка сервера</div>`;
        }
    }
</script>

</body>
</html>
