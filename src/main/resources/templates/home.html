<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EasyLink</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="d-flex flex-column min-vh-100">

<div class="container">

    <header class="d-flex flex-wrap align-items-center justify-content-between py-3 mb-4 border-bottom">

        <div class="d-flex align-items-center">
            <i class="bi bi-link-45deg" style="font-size: 32px;"></i>
            <span class="fw-bold fs-4 ms-2">EasyLink</span>
        </div>

        <ul class="nav">
            <li><a href="/" class="nav-link link-secondary">Главная</a></li>
            <li><a href="/all-urls" class="nav-link">Все ссылки</a></li>
            <li><a href="/about" class="nav-link">О сервисе</a></li>
            <li><a href="/contacts" class="nav-link">Контакты</a></li>
        </ul>

        <div id="authHeader">
            <a href="/login" class="btn btn-outline-primary me-2">Войти</a>
            <a href="/register" class="btn btn-primary">Регистрация</a>
        </div>

    </header>

</div>

<main class="container flex-grow-1 mt-5">

    <div id="guestMessage" class="alert alert-info d-none">
        Войдите, чтобы создавать ссылки.
        <a href="/login" class="alert-link">Войти</a> или
        <a href="/register" class="alert-link">зарегистрироваться</a>.
    </div>

    <div id="shortenSection" class="d-none">
        <h2 class="mb-4">Сократить ссылку</h2>

        <div class="input-group mb-3">
            <input type="text"
                   id="urlInput"
                   class="form-control"
                   placeholder="https://example.com">

            <button class="btn btn-primary"
                    id="shortenBtn"
                    onclick="shortenUrl()">
                Сократить
            </button>
        </div>

        <div id="result"></div>
    </div>

</main>

<footer class="container py-3 border-top mt-auto">

    <div class="d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center">
            <i class="bi bi-link-45deg" style="font-size: 28px;"></i>
            <span class="ms-2 text-body-secondary">© 2026 EasyLink</span>
        </div>


    </div>

</footer>

<script>
    let currentUser = null;

    async function loadCurrentUser() {
        try {
            const response = await fetch("/api/auth/me", { credentials: "include" });
            if (response.ok) {
                currentUser = await response.json();
                showAuthenticatedUI();
            } else {
                showGuestUI();
            }
        } catch (e) {
            showGuestUI();
        }
    }

    function showAuthenticatedUI() {
        document.getElementById("guestMessage").classList.add("d-none");
        document.getElementById("shortenSection").classList.remove("d-none");
        document.getElementById("authHeader").innerHTML =
            `<span class="me-3 text-body-secondary">${currentUser.username}</span>` +
            `<button class="btn btn-outline-secondary" onclick="logout()">Выйти</button>`;
    }

    function showGuestUI() {
        currentUser = null;
        document.getElementById("guestMessage").classList.remove("d-none");
        document.getElementById("shortenSection").classList.add("d-none");
        document.getElementById("authHeader").innerHTML =
            `<a href="/login" class="btn btn-outline-primary me-2">Войти</a>` +
            `<a href="/register" class="btn btn-primary">Регистрация</a>`;
    }

    async function logout() {
        try {
            await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
        } catch (e) {
            alert("Ошибка сети. Проверьте подключение.");
            return;
        }
        showGuestUI();
    }

    async function shortenUrl() {
        const url = document.getElementById("urlInput").value;
        const result = document.getElementById("result");
        const btn = document.getElementById("shortenBtn");

        if (!url) {
            result.innerHTML = `<div class="alert alert-danger">Введите ссылку</div>`;
            return;
        }

        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = "Обработка…";
        result.innerHTML = "";

        try {
            const response = await fetch("/api/urls", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ url })
            });

            if (response.status === 401 || response.status === 403) {
                result.innerHTML = `<div class="alert alert-warning">Войдите, чтобы создавать ссылки.</div>`;
                return;
            }

            if (!response.ok) {
                result.innerHTML = `<div class="alert alert-danger">Ошибка сервера</div>`;
                return;
            }

            const data = await response.json();
            result.innerHTML =
                `<div class="alert alert-success mt-3">
                    Короткая ссылка: <br>
                    <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>
                </div>`;
        } catch (e) {
            alert("Ошибка сети. Проверьте подключение.");
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    loadCurrentUser();
</script>

</body>
</html>
